input {
    kb_layout = us,th
    # us=default (index 0), th=secondary. Lock forces us; see keybinds.conf.
    kb_options =

    sensitivity = 0.3
    accel_profile = adaptive
}

# Force Intel iGPU primary to avoid NVIDIA/Intel dmabuf cross-GPU crash
# (card1 = Intel i915, card0 = NVIDIA)
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0
env = WLR_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0

exec-once = ~/.config/hypr/scripts/monitor-watcher.fish

# Super+Alt+M → open monitor layout editor (nwg-displays)
bind = $kbMonitorSetup, exec, nwg-displays

# ── Per-monitor workspaces ────────────────────────────────────────────────────
# ws 1-10 belong to HDMI-A-2, ws 11-20 to eDP-1 (bound by name = stable across reboots).
# wsaction.fish already does group-of-10 math (base = floor((active-1)/10)*10), so
# Super+1..0 switches the workspace on whichever monitor the mouse/focus is on, and each
# monitor starts at its own first workspace (HDMI→1, eDP→shown as 1 too via the bar).
# To swap which screen is "first", flip the two monitor names below.
workspace = 1, monitor:HDMI-A-2, default:true
workspace = 2, monitor:HDMI-A-2
workspace = 3, monitor:HDMI-A-2
workspace = 4, monitor:HDMI-A-2
workspace = 5, monitor:HDMI-A-2
workspace = 6, monitor:HDMI-A-2
workspace = 7, monitor:HDMI-A-2
workspace = 8, monitor:HDMI-A-2
workspace = 9, monitor:HDMI-A-2
workspace = 10, monitor:HDMI-A-2
workspace = 11, monitor:eDP-1, default:true
workspace = 12, monitor:eDP-1
workspace = 13, monitor:eDP-1
workspace = 14, monitor:eDP-1
workspace = 15, monitor:eDP-1
workspace = 16, monitor:eDP-1
workspace = 17, monitor:eDP-1
workspace = 18, monitor:eDP-1
workspace = 19, monitor:eDP-1
workspace = 20, monitor:eDP-1
