# Lid switch: close → if external monitor present, just blank eDP; else suspend
# Open → re-enable eDP
#
# IMPORTANT: switch binds are matched against the ROOT submap only. Caelestia keeps
# the session permanently in submap "global" (set in keybinds.conf, sourced before
# this file), so switch binds defined here would land in "global" and NEVER fire.
# Reset to root for the switch binds, then restore "global".
submap = reset
bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/scripts/lid.fish close
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/scripts/lid.fish open
submap = global
