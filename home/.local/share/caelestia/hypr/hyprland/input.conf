input {
    kb_layout = us,th
    # Win+Space toggles us<->th (keybinds.conf). Lock screen forces us via the
    # switchxkblayout exec on the lock bind — so the password is always English.
    numlock_by_default = false
    repeat_delay = 250
    repeat_rate = 35

    focus_on_close = 1
    scroll_factor = 2.3  # mouse wheel speed

    touchpad {
        natural_scroll = true
        disable_while_typing = $touchpadDisableTyping
        scroll_factor = $touchpadScrollFactor
    }
}

binds {
    scroll_event_delay = 0
}

cursor {
    hotspot_padding = 1

    # Hyprcursor: animated/themed cursors (when theme ships hyprcursor variant)
    enable_hyprcursor = true
    sync_gsettings_theme = true

    # SW cursor: required by dynamic-cursors plugin for shake-to-find resize
    no_hardware_cursors = true
}

# dynamic-cursors plugin (shake-to-find cursor)
plugin {
    dynamic-cursors {
        enabled = true
        mode = tilt
        threshold = 2

        shake {
            enabled = true
            nearest = true
            threshold = 3.0
            base = 3.5
            speed = 20.0
            influence = 0.0
            limit = 3.5
            timeout = 2000
            effects = false
            ipc = false
        }
    }
}

