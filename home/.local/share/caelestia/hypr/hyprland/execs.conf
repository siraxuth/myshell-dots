# Keyring and auth
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Auto delete trash 30 days old
exec-once = trash-empty 30

# Cursors
exec-once = hyprctl setcursor $cursorTheme $cursorSize
exec-once = gsettings set org.gnome.desktop.interface cursor-theme '$cursorTheme'
exec-once = gsettings set org.gnome.desktop.interface cursor-size $cursorSize

# Location provider and night light
exec-once = /usr/lib/geoclue-2.0/demos/agent
exec-once = sleep 1 && gammastep

# Forward bluetooth media commands to MPRIS
exec-once = mpris-proxy

# Resize and move windows based on matches (e.g. pip)
exec-once = caelestia resizer -d

# Start shell
exec-once = caelestia shell -d

# Load hyprpm plugins (dynamic-cursors → shake-to-find)
# Re-apply cursor after plugin loads — plugin takes over SW cursor rendering
exec-once = hyprpm reload -n && sleep 0.5 && hyprctl setcursor $cursorTheme $cursorSize

# Pre-warm emoji picker (resident GApplication; Super+. just raises window = instant)
exec-once = /usr/bin/python /usr/bin/smile --start-hidden

# Idle daemon (timeouts in variables.conf)
exec-once = hypridle

# Keep monitor layout sane across boot, hotplug, and single-screen sessions
exec-once = /usr/bin/fish /home/siraxuth/.config/hypr/scripts/monitor-watcher.fish
