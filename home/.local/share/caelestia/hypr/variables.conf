# ### Hyprland ###
# Apps
$terminal = foot
$browser = zen-browser
$editor = codium
$fileExplorer = thunar
$communicationApp = discord

# Touchpad
$touchpadDisableTyping = true
$touchpadScrollFactor = 0.6
$workspaceSwipeFingers = 4
$gestureFingers = 3
$gestureFingersMore = 4

# Blur
$blurEnabled = true
$blurSpecialWs = false
$blurPopups = true
$blurInputMethods = true
$blurSize = 8
$blurPasses = 2
$blurXray = false

# Shadow
$shadowEnabled = true
$shadowRange = 20
$shadowRenderPower = 3
$shadowColour = rgba($surfaced4)

# Gaps
$workspaceGaps = 20
$windowGapsIn = 5
$windowGapsOut = 10
$singleWindowGapsOut = 20

# Window styling
$windowOpacity = 0.95
$windowRounding = 15

$windowBorderSize = 1
$activeWindowBorderColour = rgba($primarye6)
$inactiveWindowBorderColour = rgba($onSurfaceVariant11)

# Misc
$volumeStep = 10  # In percent
$cursorTheme = Windows11Dark
$cursorSize = 24

# Idle / lock timeouts (seconds)
$idleScreenOff = 300    # 5 min → DPMS off
$idleLock = 600         # 10 min → lock screen
$idleSuspend = 1800     # 30 min → suspend (0 = disable)


# ### Keybinds ###
# Workspaces
$kbMoveWinToWs = Super+Alt
$kbMoveWinToWsGroup = Ctrl+Super+Alt
$kbGoToWs = Super
$kbGoToWsGroup = Ctrl+Super

$kbNextWs = Ctrl+Super, right
$kbPrevWs = Ctrl+Super, left

$kbToggleSpecialWs = Super, S

# Window groups
$kbWindowGroupCycleNext = Alt, Tab
$kbWindowGroupCyclePrev = Shift+Alt, Tab
$kbUngroup = Super, U
$kbToggleGroup = Super, Comma

# Window actions
# Use keycodes (code:52=Z, code:53=X) so these stay alive in the Thai layout —
# letter binds die when th is active because the keys emit Thai keysyms.
$kbMoveWindow = Super, code:52
$kbResizeWindow = Super, code:53
$kbWindowPip = Super+Alt, Backslash
$kbPinWindow = Super, P
$kbWindowFullscreen = Super, F
$kbWindowBorderedFullscreen = Super+Alt, F
$kbToggleWindowFloating = Super+Alt, Space
$kbCloseWindow = Super, Q

# Special workspace toggles
$kbSystemMonitor = Ctrl+Shift, Escape
$kbMusic = Super, M
$kbCommunication = Super, D
$kbTodo = Super, R

# Apps
$kbTerminal = Super, T
$kbBrowser = Super, W
$kbEditor = Super, C
$kbFileExplorer = Super, E

# Misc
$kbSession = Ctrl+Alt, Delete
$kbShowSidebar = Super, N
$kbClearNotifs = Ctrl+Alt, C
$kbShowPanels = Super, K
# Keycode (code:46=L) so the lock bind still fires while Thai is active
$kbLock = Super, code:46
$kbRestoreLock = Super+Alt, code:46
$kbMonitorSetup = Super+Alt, M
